name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find, Repair and Grant execute permission for gradlew
      run: |
        # Ищем файл gradlew по всему репозиторию, игнорируя регистр
        GRADLEW_PATH=$(find . -iname "gradlew" | head -n 1)
        
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Критическая ошибка: файл gradlew вообще не найден в проекте!"
          exit 1
        fi
        
        echo "Файл gradlew успешно найден по пути: $GRADLEW_PATH"
        
        # Запоминаем папку, где лежит gradlew
        GRADLEW_DIR=$(dirname "$GRADLEW_PATH")
        echo "GRADLEW_DIR=$GRADLEW_DIR" >> $GITHUB_ENV
        
        # Принудительно удаляем виндовые концы строк (\r) из самого файла gradlew
        sed -i 's/\r$//' "$GRADLEW_PATH"
        
        # Также чистим первую строку (shebang), если там затесался \r
        sed -i '1s/\r$//' "$GRADLEW_PATH"
        
        # Даем права на выполнение
        chmod +x "$GRADLEW_PATH"
        echo "Права доступа успешно выданы!"

    - name: Build Release APK
      run: |
        cd ${{ env.GRADLEW_DIR }}
        ./gradlew assembleRelease

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/build/outputs/apk/release/*-unsigned.apk
          **/build/outputs/apk/release/*.apk
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}