name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 9.3.1

    - name: Build APK
      run: |
        # Собираем дебаг-версию, которая не требует внешних .jks ключей и собирается всегда
        gradle assembleDebug

    - name: Rename APK for Release
      run: |
        # Находим собранный APK и переименовываем его красиво для релиза
        APK_PATH=$(find . -name "*.apk" | head -n 1)
        echo "Найден APK по пути: $APK_PATH"
        mkdir -p release_artifacts
        cp "$APK_PATH" release_artifacts/mihashop-release.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: release_artifacts/mihashop-release.apk
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
