name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Find, Repair and Fix Gradle Wrapper
      run: |
        # Находим, где лежит gradlew
        GRADLEW_PATH=$(find . -iname "gradlew" | head -n 1)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Критическая ошибка: файл gradlew не найден!"
          exit 1
        fi
        
        GRADLEW_DIR=$(dirname "$GRADLEW_PATH")
        echo "GRADLEW_DIR=$GRADLEW_DIR" >> $GITHUB_ENV
        
        # Лечим концы строк винды
        sed -i 's/\r$//' "$GRADLEW_PATH"
        sed -i '1s/\r$//' "$GRADLEW_PATH"
        chmod +x "$GRADLEW_PATH"
        
        # Проверяем и фиксим gradle-wrapper.jar
        WRAPPER_DIR="$GRADLEW_DIR/gradle/wrapper"
        mkdir -p "$WRAPPER_DIR"
        
        if [ ! -f "$WRAPPER_DIR/gradle-wrapper.jar" ]; then
          echo "Файл gradle-wrapper.jar потерялся. Скачиваем напрямую от Gradle..."
          # Скачиваем стабильную версию jar-враппера
          curl -Lo "$WRAPPER_DIR/gradle-wrapper.jar" https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
        fi

    - name: Build Release APK
      run: |
        cd ${{ env.GRADLEW_DIR }}
        ./gradlew assembleRelease

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/build/outputs/apk/release/*-unsigned.apk
          **/build/outputs/apk/release/*.apk
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
