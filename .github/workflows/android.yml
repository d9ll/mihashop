name: Build & Release Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Fix and Force Download Gradle Wrapper
      run: |
        # Находим gradlew в корне
        GRADLEW_PATH=$(find . -iname "gradlew" | head -n 1)
        if [ -z "$GRADLEW_PATH" ]; then
          echo "Критическая ошибка: файл gradlew не найден!"
          exit 1
        fi
        
        GRADLEW_DIR=$(dirname "$GRADLEW_PATH")
        echo "GRADLEW_DIR=$GRADLEW_DIR" >> $GITHUB_ENV
        
        # Исправляем виндовые переносы строк
        sed -i 's/\r$//' "$GRADLEW_PATH"
        sed -i '1s/\r$//' "$GRADLEW_PATH"
        chmod +x "$GRADLEW_PATH"
        
        # Принудительно создаем структуру gradle/wrapper
        mkdir -p "$GRADLEW_DIR/gradle/wrapper"
        
        # Скачиваем стабильный чистый gradle-wrapper.jar с официального репозитория Gradle
        echo "Скачиваем gradle-wrapper.jar..."
        curl -Lo "$GRADLEW_DIR/gradle/wrapper/gradle-wrapper.jar" https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar
        
        if [ -f "$GRADLEW_DIR/gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "Файл успешно скачан и добавлен!"
        else
          echo "Не удалось скачать jar файл!"
          exit 1
        fi

    - name: Build Release APK
      run: |
        cd ${{ env.GRADLEW_DIR }}
        ./gradlew assembleRelease

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          **/build/outputs/apk/release/*-unsigned.apk
          **/build/outputs/apk/release/*.apk
        name: Release ${{ github.ref_name }}
        tag_name: ${{ github.ref }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
